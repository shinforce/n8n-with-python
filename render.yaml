services:
  - type: web
    name: n8n-with-python
    env: docker
    dockerfile: Dockerfile
    plan: starter
    envVars:
      # Authentication
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        generateValue: true
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # Use DATABASE_URL from Render
      - key: DATABASE_URL
        fromDatabase:
          name: n8n-database  # Replace with your actual database service name
          property: connectionString
      
      # Additional settings
      - key: N8N_HOST
        value: n8n-with-python.onrender.com
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        value: https://n8n-with-python.onrender.com/
