services:
  - type: web
    name: n8n-with-python
    env: docker
    dockerfile: Dockerfile
    plan: starter
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        generateValue: true
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromService:
          type: postgres
          name: n8n-database
          property: host
      - key: DB_POSTGRESDB_PASSWORD
        fromService:
          type: postgres
          name: n8n-database
          property: password
      - key: DB_POSTGRESDB_DATABASE
        value: n8n
      - key: DB_POSTGRESDB_USER
        value: n8n_user
