services:
  - type: web
    name: n8n-with-python
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      # Authentication
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        generateValue: true
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # CRITICAL: Database Configuration
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: dpg-d3bsmhili9vc73d2hcvg-a  # Internal hostname
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: n8n_3dvd
      - key: DB_POSTGRESDB_USER
        value: n8n_user  # FIXED: Use correct username
      - key: DB_POSTGRESDB_PASSWORD
        sync: false  # Set manually in dashboard
      
      # SSL Configuration (Required for Render)
      - key: DB_POSTGRESDB_SSL_MODE
        value: require
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      
      # n8n Configuration
      - key: N8N_HOST
        value: n8n-with-python.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n-with-python.onrender.com/
      - key: NODE_ENV
        value: production
      
      # Important for Docker
      - key: EXECUTIONS_PROCESS
        value: main
      
      # Remove after it works
      - key: N8N_LOG_LEVEL
        value: debug
