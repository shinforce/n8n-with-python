services:
  - type: web
    name: n8n-with-python
    env: docker
    dockerfile: Dockerfile
    plan: starter
    envVars:
      # Authentication
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        generateValue: true
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      
      # Database Configuration
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: dpg-d3bsmhili9vc73d2hcvg-a  # Internal URL (no domain)
      - key: DB_POSTGRESDB_DATABASE
        value: n8n_3dvd
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        sync: false  # This tells Render to expect manual input
      - key: DB_POSTGRESDB_PORT
        value: "5432"  # Ensure this is a string
      
      # Additional settings
      - key: N8N_HOST
        value: n8n-with-python.onrender.com
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        value: https://n8n-with-python.onrender.com/
      
      # Temporary debug (remove after it works)
      - key: N8N_LOG_LEVEL
        value: debug
